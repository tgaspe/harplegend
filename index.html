<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HarpLegend</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 1.5rem 4rem;
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: #333;
      line-height: 1.7;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.2rem;
      border-radius: 18px;
      display: block;
    }
    h1 { font-size: 28px; margin: 0 0 4px; }
    .subtitle { color: #777; font-size: 15px; margin-bottom: 2.5rem; }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      max-width: 360px;
      margin: 0 auto;
    }
    .btn {
      display: block;
      padding: 0.9rem 1.2rem;
      border: 1px solid #ddd;
      border-radius: 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: 15px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover {
      border-color: #3030F1;
      background: #f5f6ff;
    }
    .btn .desc {
      display: block;
      font-weight: normal;
      color: #777;
      font-size: 13px;
      margin-top: 2px;
    }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 2.5rem 0; }
    footer { color: #999; font-size: 13px; }
    footer a { color: #3030F1; }
  </style>
</head>
<body>

<img class="logo" src="assets/icon.png" alt="HarpLegend icon">
<h1>HarpLegend</h1>
<div class="subtitle">ChewPacaStudios (theo_dev)</div>

<div class="links">
  <a class="btn" href="privacy-policy.html">
    Privacy Policy
    <span class="desc">What we collect and how it's used</span>
  </a>
  <a class="btn" href="delete-account.html">
    Delete Account
    <span class="desc">Remove your account and data</span>
  </a>
  <a class="btn" href="song-guide.html">
    Song Chart Guide
    <span class="desc">How to create and upload your own songs</span>
  </a>
</div>

<hr>

<footer>
  Developer: theo_dev · Questions? Contact <a href="mailto:chewpacastudios@gmail.com">chewpacastudios@gmail.com</a>
</footer>

</html>
